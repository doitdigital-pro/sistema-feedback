version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: imgc-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-imgcraetivo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secreto_db_coolify_2026}
      POSTGRES_DB: ${POSTGRES_DB:-imgc_feedback}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-imgcraetivo} -d ${POSTGRES_DB:-imgc_feedback}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imgc-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-imgcraetivo}:${POSTGRES_PASSWORD:-secreto_db_coolify_2026}@postgres:5432/${POSTGRES_DB:-imgc_feedback}?schema=public
      JWT_SECRET: ${JWT_SECRET:-secreto-prod-imgc-feedback-coolify}
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3001}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
    container_name: imgc-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
